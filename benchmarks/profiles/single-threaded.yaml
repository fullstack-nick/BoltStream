server:
  listen: "127.0.0.1:9000"
  admin_listen: "127.0.0.1:9100"
runtime:
  io_workers: 1
storage:
  data_dir: "./data"
  segment_bytes: 268435456
  segment_max_age_seconds: 3600
  append_batch_records: 1
retention:
  max_age_seconds: 604800
  max_bytes: 1073741824
  check_interval_ms: 60000
limits:
  max_frame_bytes: 1048576
  max_fetch_records: 100
  max_fetch_bytes: 1048576
  max_topic_partitions: 128
  max_fetch_wait_ms: 30000
  max_append_queue_depth: 1024
  append_workers: 0
  max_broker_connections: 128
  max_long_poll_waiters: 128
metrics:
  enabled: true
logging:
  level: warn
  format: json
