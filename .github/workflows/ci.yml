name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  linux:
    name: Linux ${{ matrix.build_type }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]
    steps:
      - uses: actions/checkout@v4

      - name: Verify runner tools
        run: |
          cmake --version
          ninja --version
          g++ --version
          clang-format --version
          clang-tidy --version
          curl --version
          tar --version
          zip --version

      - name: Configure
        run: |
          if [ "${{ matrix.build_type }}" = "Release" ]; then
            cmake --preset linux-gcc-release
          else
            cmake --preset linux-gcc-debug
          fi

      - name: Build
        run: |
          if [ "${{ matrix.build_type }}" = "Release" ]; then
            cmake --build --preset build-linux-gcc-release
          else
            cmake --build --preset build-linux-gcc-debug
          fi

      - name: Test
        if: matrix.build_type == 'Debug'
        run: ctest --preset test-linux-gcc-debug

      - name: Format check
        if: matrix.build_type == 'Debug'
        run: pwsh ./scripts/format.ps1

      - name: Phase 10 benchmark smoke
        if: matrix.build_type == 'Debug'
        run: pwsh ./scripts/smoke-phase10.ps1 -Preset linux-gcc-debug -SkipBuild

      - name: Validate Phase 9 operations assets
        if: matrix.build_type == 'Debug'
        run: |
          docker compose config --quiet
          docker run --rm --entrypoint /bin/promtool \
            -v "$PWD/deployments/metrics:/etc/prometheus:ro" \
            prom/prometheus@sha256:c6b27ea434f8389bfe233fbc7be381cf50587c286e871bc842008f5a1b1908a7 \
            check config /etc/prometheus/prometheus.yml
          docker run --rm --entrypoint /bin/promtool \
            -v "$PWD/deployments/metrics:/etc/prometheus:ro" \
            -w /etc/prometheus \
            prom/prometheus@sha256:c6b27ea434f8389bfe233fbc7be381cf50587c286e871bc842008f5a1b1908a7 \
            test rules alerts.test.yml

      - name: Package Linux artifact
        if: matrix.build_type == 'Release'
        run: |
          cmake --install build/linux-gcc-release --prefix dist/boltstream
          mkdir -p artifacts
          tar -czf "artifacts/boltstream-linux-x86_64-${GITHUB_SHA::12}.tar.gz" -C dist/boltstream .

      - name: Upload Linux artifact
        if: matrix.build_type == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: boltstream-linux-x86_64-${{ github.sha }}
          path: artifacts/*.tar.gz
          if-no-files-found: error

  windows-msvc:
    name: Windows MSVC smoke
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure and build
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          $vcvars = Join-Path $vs "VC\Auxiliary\Build\vcvars64.bat"
          cmd /c "call `"$vcvars`" && cmake --preset windows-msvc-debug && cmake --build --preset build-windows-msvc-debug && ctest --preset test-windows-msvc-debug"

      - name: Phase 7 smoke
        shell: pwsh
        run: ./scripts/smoke-phase7.ps1 -Preset windows-msvc-debug

      - name: Phase 9 smoke
        shell: pwsh
        run: ./scripts/smoke-phase9.ps1 -Preset windows-msvc-debug

      - name: Phase 10 benchmark smoke
        shell: pwsh
        run: ./scripts/smoke-phase10.ps1 -Preset windows-msvc-debug -SkipBuild

  thread-sanitizer:
    name: Linux ThreadSanitizer
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Configure ThreadSanitizer
        run: >-
          cmake -S . -B build/linux-tsan -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DBOLTSTREAM_BUILD_BENCHMARKS=OFF
          -DCMAKE_CXX_FLAGS="-fsanitize=thread -fno-omit-frame-pointer -Wno-error=tsan"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=thread"

      - name: Build focused tests
        run: cmake --build build/linux-tsan --target boltstream_tests

      - name: Run concurrent broker tests
        env:
          TSAN_OPTIONS: halt_on_error=1:second_deadlock_stack=1
        run: >-
          ctest --test-dir build/linux-tsan --output-on-failure
          -R "ClientBrokerTests.(ConcurrentMetricsScrapesRemainWellFormedDuringTraffic|ConcurrentProducersAssignUniqueOffsets|MultipleConcurrentRequestsPreserveCorrelationIds)"
