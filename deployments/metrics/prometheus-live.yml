global:
  scrape_interval: 5s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: boltstream
    scrape_protocols: [PrometheusText0.0.4]
    static_configs:
      - targets: ["host.docker.internal:19100"]
        labels:
          source: gcp-ssh-tunnel
