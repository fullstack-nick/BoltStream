server:
  listen: "0.0.0.0:9000"
  admin_listen: "127.0.0.1:9100"
storage:
  data_dir: "/var/lib/boltstream"
runtime:
  phase: 8
  protocol_version: 4
  storage_format_version: 2
  max_frame_bytes: 1048576
  max_fetch_records: 100
  max_fetch_bytes: 1048576
  max_fetch_wait_ms: 30000
  max_append_queue_depth: 32
  append_workers: 2
  max_broker_connections: 128
  max_long_poll_waiters: 128
  segment_bytes: 268435456
  segment_max_age_seconds: 3600
  retention_max_age_seconds: 604800
  retention_max_bytes: 1073741824
  retention_check_interval_ms: 60000
